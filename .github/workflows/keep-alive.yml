name: Supabase Keep-Alive

# Free-tier Supabase projects auto-pause after a period of inactivity. This
# pings the project's REST endpoint on a schedule so it stays active.
#
# Note: the bare /rest/v1/ root (OpenAPI schema) rejects publishable keys
# with "Secret API key required", so we query a table endpoint instead.

on:
  schedule:
    - cron: "0 6 */3 * *"
  workflow_dispatch:
  push:
    branches:
      - claude/keep-alive-debug-headers

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            "https://frkdcwhyekhuvorhkzgr.supabase.co/rest/v1/profiles?select=id&limit=1")

          echo "Supabase responded with HTTP status $status"

          if [ "$status" -ge 400 ]; then
            echo "::warning::Supabase keep-alive request failed with HTTP status $status"
          fi
